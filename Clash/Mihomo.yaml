# Clash · 锚点改写版（block + YAML 锚点，功能等价 Sample.yaml）
# Date: 2026-07-13 11:43:31
# Author: @HotKids
#
# 自动生成（sync-config.py 从 Clash/Sample.yaml 转译），请勿手改；改内容请改 Surge/Profile.conf。

# ── 通用设置 ──

# 混合代理端口（HTTP 和 SOCKS5 共用）
mixed-port: 7892
# 允许局域网设备通过本机代理
allow-lan: true
# 监听地址，'*' 表示所有网卡
bind-address: '*'
# 代理模式：rule（规则）/ global（全局）/ direct（直连）
mode: rule
# 日志等级：silent / error / warning / info / debug
log-level: info
# 关闭 IPv6：阻断所有 IPv6 连接并屏蔽 AAAA DNS 记录
ipv6: false
# RESTful API 监听地址（供 Dashboard 及外部控制器使用）
external-controller: 127.0.0.1:9090

# ── 性能设置 ──

# 统一延迟：去除 TCP 握手耗时，使延迟测试结果更准确
unified-delay: true
# TCP 并发：同时向所有解析 IP 发起连接，取最快握手
tcp-concurrent: true
# 进程匹配模式：always 强制 / strict 自动（默认）/ off 不匹配（适合路由器）
find-process-mode: strict
# GeoData 加载模式：standard 性能优先 / memconservative 低内存（适合路由器/嵌入式）
geodata-loader: standard
# HTTP 请求 UA（显式声明，避免随版本漂移）
global-ua: clash.meta
# TCP Keep-Alive 探测间隔（秒）
keep-alive-interval: 30

# ── GeoData 设置 ──

# 自动更新 GeoData 数据库
geo-auto-update: true
# 更新间隔（小时）
geo-update-interval: 24
# GeoData 数据库 URL
geox-url: {geoip: 'https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat', geosite: 'https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat', mmdb: 'https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb', asn: 'https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb'}

# ── Hosts ──

# 静态域名映射，优先级高于 DNS 解析
hosts: {localhost: 127.0.0.1}

# ── 配置持久化 ──

# store-selected 记住策略组选择；store-fake-ip 持久化 fake-ip 映射（重启后 IP 不变）
profile: {store-selected: true, store-fake-ip: true}

# ── NTP 校时 ──

# 内置 NTP：部分协议（如 VMess）对本机时间偏差敏感，校时失败会导致握手异常；
# write-to-system=false 不写入系统时间，仅供内核内部使用
ntp: {enable: true, write-to-system: false, server: ntp.aliyun.com, port: 123, interval: 60}

# ── 域名嗅探 ──

# 嗅探结果仅用于规则匹配、不替换目标地址（fake-ip 下 override-destination=false，HTTP 单独覆盖为 true）；
# force-dns-mapping=true 改善直连 IP 命中；parse-pure-ip=false 避免纯 IP 连接的大量 "may not have any sent data" 警告
sniffer: {enable: true, override-destination: false, force-dns-mapping: true, parse-pure-ip: false, sniff: {HTTP: {ports: [80, 8080-8880], override-destination: true}, TLS: {ports: [443, 8443]}, QUIC: {ports: [443, 8443]}}, skip-domain: [+.push.apple.com, Mijia Cloud]}

# ── DNS ──

# fake-ip（blacklist）：fake-ip-filter 内域名返回真实 IP，其余走 fake-ip；default-nameserver 仅解析上游域名（纯 IP）；
# 主 DNS 经 #RULES 走代理拿干净结果，防境外域名泄露给国内 DNS；nameserver-policy 按声明顺序先窄后宽：
# 内网域名交系统解析器、NTP 用裸 IP UDP（校时不依赖 TLS）、国内域名国内 DoH 就近解析；代理节点/DIRECT 域名同走国内 DoH
dns: {enable: true, listen: '0.0.0.0:1053', ipv6: false, use-system-hosts: true, cache-algorithm: arc, prefer-h3: false, respect-rules: false, default-nameserver: [223.5.5.5, 119.29.29.29], enhanced-mode: fake-ip, fake-ip-range: 198.18.0.1/16, fake-ip-range6: '', fake-ip-ttl: 1, fake-ip-filter-mode: blacklist, fake-ip-filter: ['*.lan', +.lan, '*.local', '*.localdomain', '*.home.arpa', '*.localhost', WORKGROUP, time.*.com, time.*.gov, time.*.apple.com, ntp.*.com, +.pool.ntp.org, '*.ntp.org.cn', +.stun.*, '*.stun.*.*', '*.turn.twilio.com', '*.stun.twilio.com', stun.syncthing.net, '*.srv.nintendo.net', xbox.*.microsoft.com, xbox.*.*.microsoft.com, '*.xboxlive.com', '*.cm.steampowered.com', '*.steamcontent.com', '*.battlenet.com.cn', '*.battlenet.com', '*.blzstatic.cn', '*.battle.net', '*.msftncsi.com', '*.msftconnecttest.com', connectivitycheck.gstatic.com, connectivitycheck.android.com, connectivitycheck.platform.hicloud.com, connect.rom.miui.com, captive.apple.com, network-test.debian.org, detectportal.firefox.com, lens.l.google.com, +.push.apple.com, +.market.xiaomi.com, '*.tailscale.com', '*.zerotier.com', '*.spotify.com', +.music.126.net, '*.mcdn.bilivideo.cn', localhost.*.qq.com], nameserver: ['https://1.1.1.1/dns-query#RULES'], nameserver-policy: {'geosite:private': [system], 'time.*.com,time.*.gov,time.*.apple.com,ntp.*.com,+.pool.ntp.org,*.ntp.org.cn': [223.5.5.5, 119.29.29.29], 'geosite:cn': ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']}, proxy-server-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query'], direct-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query'], direct-nameserver-follow-policy: false}

# ── TUN ──

# 接管系统全量流量；stack mixed（TCP 系统栈 + UDP gvisor，推荐）；dns-hijack 劫持 53 端口防绕过；
# auto-route/auto-redirect 自动配路由与透明代理（仅 Linux）；strict-route 防 IP 泄漏；
# EIM NAT 改善游戏/VOIP/WebRTC 打洞；disable-icmp-forwarding 关闭 ICMP 代答，让 ping 反映真实链路
tun: {enable: true, stack: mixed, dns-hijack: ['any:53'], auto-route: true, auto-detect-interface: true, auto-redirect: true, gso: true, gso-max-size: 65536, strict-route: true, endpoint-independent-nat: true, disable-icmp-forwarding: true}

# ── 节点 ──

# 锚点：供下方 proxy-groups / rule-providers 以 <<: 合并、filter: 引用
anchors:
  # 远程规则集参数：http，每日更新一次（behavior/format 留各条自定）
  - &Remote {type: http, interval: 86400}
  # 地区分组基座：select + 全量 provider，节点保持订阅原序（🇺🇳 Server 直接用，地区组再叠 filter）
  - &Region {type: select, include-all-providers: true}
  # 地区节点筛选正则（与 Profile.conf policy-regex-filter 一致）
  - &FilterHK '(?i)(?:🇭🇰|香港|Hong Kong|\b(?:HK|HKG)\d*\b)'
  - &FilterTW '(?i)(?:🇨🇳|🇹🇼|台湾|Taiwan|\b(?:TW|TWN)\d*\b)'
  - &FilterSG '(?i)(?:🇸🇬|新加坡|Singapore|\b(?:SG|SGP)\d*\b)'
  - &FilterJP '(?i)(?:🇯🇵|日本|Japan|\b(?:JP|JPN)\d*\b)'
  - &FilterUS '(?i)(?:🇺🇸|美国|United States|\b(?:US|USA)\d*\b)'
  # —— 以下自动策略锚点当前未被引用，供日后加自动/故障转移/负载均衡组时 <<: 合并 ——
  - &UrlTest {type: url-test, interval: 300, tolerance: 20, lazy: true, url: 'https://cp.cloudflare.com/generate_204', timeout: 2000, max-failed-times: 3, include-all-providers: true, hidden: true}
  - &FallBack {type: fallback, interval: 300, lazy: true, url: 'https://cp.cloudflare.com/generate_204', timeout: 2000, max-failed-times: 3, include-all-providers: true, hidden: true}
  - &LoadBalance {type: load-balance, interval: 300, lazy: true, strategy: consistent-hashing, url: 'https://cp.cloudflare.com/generate_204', timeout: 2000, max-failed-times: 3, include-all-providers: true, hidden: true}

# 本地节点（订阅覆盖此处）
proxies: []
# 服务器订阅配置（每小时更新，健康检查用 Cloudflare 204）
proxy-providers: {Server: {type: http, path: ./Provider/Proxy/Server.yaml, url: 'https://sub.hotkids.me', interval: 3600, proxy: DIRECT, header: {User-Agent: [Clash/v1.18.0, mihomo/1.18.3]}, health-check: {enable: true, url: 'https://cp.cloudflare.com/generate_204', interval: 600, timeout: 5000, expected-status: 204}}}

