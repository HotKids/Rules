# 通用设置

# 混合代理端口（HTTP 和 SOCKS5 共用）
mixed-port: 7892
# HTTP(S) 独立端口（与 mixed-port 二选一）
# port: 7890
# SOCKS5 独立端口（与 mixed-port 二选一）
# socks-port: 7891
# 透明代理端口，用于 Linux 和 macOS
# redir-port: 7893
# TProxy 透明代理端口，用于 Linux（支持 TCP + UDP）
# tproxy-port: 7894

# 允许局域网设备通过本机代理
allow-lan: true
# 监听地址，'*' 表示所有网卡
bind-address: '*'

# 代理模式：rule（规则）/ global（全局）/ direct（直连）
mode: rule

# 日志等级：silent / error / warning / info / debug
log-level: info

# 关闭 IPv6：阻断所有 IPv6 连接并屏蔽 AAAA DNS 记录
ipv6: false

# RESTful API 监听地址（供 Dashboard 及外部控制器使用）
external-controller: 127.0.0.1:9090

# 出口网卡（留空由系统自动选择）
# interface-name: eth0

# ── 性能设置 ──

# 统一延迟：去除 TCP 握手耗时，使延迟测试结果更准确
unified-delay: true

# TCP 并发：同时向所有解析 IP 发起连接，取最快握手
tcp-concurrent: true

# 进程匹配模式
# always - 强制匹配所有进程
# strict - 由 mihomo 自动判断（默认）
# off   - 不匹配进程，适合路由器
find-process-mode: strict

# GeoData 加载模式
# standard      - 性能更好，适合普通设备（当前）
# memconservative - 低内存占用，适合路由器/嵌入式设备
geodata-loader: standard

# HTTP 请求 UA（显式声明，避免随版本漂移）
global-ua: clash.meta

# TCP Keep-Alive 探测间隔（秒）
keep-alive-interval: 30

# ── GeoData 设置 ──

# 自动更新 GeoData 数据库
geo-auto-update: true

# 更新间隔（小时）
geo-update-interval: 24

# GeoData 数据库 URL
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb"
  
# ── Hosts ──

# 静态域名映射，优先级高于 DNS 解析
hosts:
  '*.clash.dev': 127.0.0.1
  'localhost': 127.0.0.1

# ── 配置持久化 ──

profile:
  # 持久化策略组选择（重启后恢复上次选择）
  store-selected: true
  # 持久化 fake-ip 映射（重启后 IP 不变）
  store-fake-ip: true

# ── NTP 校时 ──

# mihomo 内置 NTP 同步：部分协议（如 VMess）对本机时间偏差敏感，
# 校时失败会导致握手异常；不写入系统时间，仅供内核内部使用
ntp:
  enable: true
  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 60

# ── 域名嗅探 ──

sniffer:
  enable: true
  # 嗅探结果仅用于规则匹配，不替换目标地址
  # fake-ip 模式下设为 false；HTTP 协议单独开启 override-destination
  override-destination: false
  # redir-host 模式下也强制嗅探，改善直连 IP 的规则命中
  force-dns-mapping: true
  # fake-ip 模式下域名已由映射得知，无需对纯 IP 连接嗅探（开启会导致大量 "may not have any sent data" 警告）
  parse-pure-ip: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      # HTTP 覆盖全局设置，用嗅探到的 Host 替换目标地址
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # 跳过嗅探的域名
  skip-domain:
    - "+.push.apple.com"
    - "Mijia Cloud"

# ── DNS ──

dns:
  enable: true
  # DNS 服务监听地址
  listen: 0.0.0.0:1053
  # 关闭 IPv6 解析，AAAA 查询返回空结果
  ipv6: false
  # 读取系统 /etc/hosts
  use-system-hosts: true
  # DNS 缓存淘汰算法（arc 兼顾命中率与性能）
  cache-algorithm: arc
  # DoH 是否启用 HTTP/3 并发尝试
  prefer-h3: false

  # nameserver / fallback 连接始终直连，不遵守路由规则
  # 各条目通过 #proxy 后缀单独指定走代理
  respect-rules: false

  # 引导 DNS：仅用于解析 nameserver / fallback 服务器的域名
  # 只能填纯 IP 地址
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 增强模式：fake-ip 返回虚假 IP，Clash 内部完成真实解析
  enhanced-mode: fake-ip
  # fake-ip 地址池（RFC 6598 保留段）
  fake-ip-range: 198.18.0.1/16
  # 禁用 IPv6 fake-ip 池，与 ipv6: false 对齐
  fake-ip-range6: ""
  # fake-ip 记录 TTL（秒），短 TTL 让断连后快速失效
  fake-ip-ttl: 1

  # blacklist 模式：列表内域名返回真实 IP，其余全部走 fake-ip
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    # 本地域名
    - "*.lan"
    - "+.lan"
    - "*.local"
    - "*.localdomain"
    - "*.home.arpa"
    - "*.localhost"
    - "WORKGROUP"
    # NTP 时间同步
    - "time.*.com"
    - "time.*.gov"
    - "time.*.apple.com"
    - "ntp.*.com"
    - "+.pool.ntp.org"
    - "*.ntp.org.cn"
    # STUN / TURN（WebRTC / 游戏打洞）
    - "+.stun.*"
    - "*.stun.*.*"
    - "*.turn.twilio.com"
    - "*.stun.twilio.com"
    - "stun.syncthing.net"
    # 游戏平台
    - "*.srv.nintendo.net"
    - "xbox.*.microsoft.com"
    - "xbox.*.*.microsoft.com"
    - "*.xboxlive.com"
    # Steam
    - "*.cm.steampowered.com"
    - "*.steamcontent.com"
    # Battle.net / Blizzard
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
    # 网络连通性探测（多平台）
    - "*.msftncsi.com"
    - "*.msftconnecttest.com"
    - "connectivitycheck.gstatic.com"
    - "connectivitycheck.android.com"
    - "connectivitycheck.platform.hicloud.com"
    - "connect.rom.miui.com"
    - "captive.apple.com"
    - "network-test.debian.org"
    - "detectportal.firefox.com"
    - "lens.l.google.com"
    # 推送通知
    - "+.push.apple.com"
    - "+.market.xiaomi.com"
    # VPN 覆盖网络
    - "*.tailscale.com"
    - "*.zerotier.com"
    # 媒体服务
    - "*.spotify.com"
    - "+.music.126.net"
    - "*.mcdn.bilivideo.cn"
    # 其他需要真实 IP 解析的域名
    - "localhost.*.qq.com"

  # 主 DNS：经代理查询，防止境外域名请求泄露至国内 DNS 服务商
  # ECS 附带国内 IP，使 Google DNS 返回 CDN 最优节点
  nameserver:
    - "https://8.8.8.8/dns-query#RULES&disable-ipv6=true&ecs=114.114.114.114/24&ecs-override=true"

  # 兜底 DNS：nameserver 返回非 CN IP 或保留地址段时触发，同样走代理
  fallback:
    - "https://1.1.1.1/dns-query#RULES"

  # 污染检测规则：符合以下任一条件时使用 fallback 结果
  fallback-filter:
    # 返回 IP 的 GeoIP 归属地非 CN
    geoip: true
    geoip-code: CN
    # 返回 IP 落在保留地址段（明显污染）
    ipcidr:
      - 240.0.0.0/4

  # 代理节点域名解析：国内 DoH，节点 IP 不会被 CN DNS 污染，速度更快
  proxy-server-nameserver:
    - https://doh.pub/dns-query

  # DIRECT 流量专用 DNS，与代理流量语义分离
  direct-nameserver:
    - https://doh.pub/dns-query
  # DIRECT DNS 连接本身不走路由规则，始终直连
  direct-nameserver-follow-policy: false

# ── TUN ──

tun:
  # 启用 TUN 网卡，接管系统全量流量
  enable: true

  # 网络栈模式
  # system - 性能最高，兼容性一般
  # gvisor - 兼容性好，性能较低
  # mixed  - TCP 走系统栈，UDP 走 gvisor（推荐）
  stack: mixed

  # 劫持所有 DNS 请求，防止应用绕过 Clash DNS
  dns-hijack:
    - any:53

  # 自动配置路由表，将全局流量引入 TUN
  auto-route: true

  # 自动识别出口网卡
  auto-detect-interface: true

  # 自动配置 iptables/nftables 透明代理（仅 Linux 生效，其他平台忽略）
  auto-redirect: true

  # GSO（Generic Segmentation Offload），提升 TUN 吞吐（仅 Linux）
  gso: true
  # GSO 单次最大数据块长度（字节）
  gso-max-size: 65536

  # 严格路由：强制所有连接经过 TUN，防止 IP 泄漏
  # 注意：开启后本设备无法被同网段其他设备主动访问
  strict-route: true

  # EIM NAT（Endpoint-Independent Mapping）
  # 改善游戏、VOIP、WebRTC 的 UDP 打洞成功率
  endpoint-independent-nat: true

  # 不代答 ICMP：默认 TUN（尤其 gvisor 栈）会自动应答所有 ICMP echo，
  # 导致 ping 任意地址都通、掩盖真实可达性；关闭代答后 ping 反映真实链路
  disable-icmp-forwarding: true

  # 自定义路由（留空则使用默认全局路由）
  # route-address:
  #   - 0.0.0.0/1
  #   - 128.0.0.0/1

  # 排除路由（这些网段不经过 TUN）
  # route-exclude-address:
  #   - 192.168.31.0/24

# 本地节点（订阅覆盖此处）
proxies: []
