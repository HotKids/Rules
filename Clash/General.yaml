# 通用设置

# port: 7890 # HTTP(S) 代理服务器端口
# socks-port: 7891 # SOCKS5 代理端口
mixed-port: 7892 # HTTP(S) 和 SOCKS 代理混合端口
# redir-port: 7893 # 透明代理端口，用于 Linux 和 MacOS
# tproxy-port: 7894 # 透明代理端口，用于 Linux (TProxy TCP and TProxy UDP)

allow-lan: true # 允许局域网连接
bind-address: '*' # 绑定 IP 地址，仅作用于 allow-lan 为 true，'*' 表示所有地址

mode: rule

# 日志等级 silent/error/warning/info/debug
log-level: info

# 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录
ipv6: false

# RESTful API 监听地址
external-controller: 127.0.0.1:9090

# 设置出口网卡
# interface-name: eth0

# 性能设置

# 统一延迟
# 去除握手等额外延迟，更准确反映节点延迟
unified-delay: true

# TCP 并发连接所有 IP，将使用最快握手的 TCP
tcp-concurrent: true

# 进程匹配模式
# always - 开启，强制匹配所有进程
# strict - 默认，由 mihomo 判断是否开启
# off - 不匹配进程，推荐在路由器上使用此模式
find-process-mode: strict

# GeoData 加载模式，memconservative 低内存，适合路由器/嵌入式设备
geodata-loader: memconservative

# 显式声明 HTTP 请求 UA，避免默认值随版本漂移
global-ua: clash.meta

# 连接设置

# TCP Keep-Alive 间隔
keep-alive-interval: 30

# GeoData 设置

# 是否自动更新 geodata
geo-auto-update: true

# 更新间隔，单位：小时
geo-update-interval: 24

# 自定义 geodata url
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"

# Hosts 设置

# 类似于 /etc/hosts，仅支持配置单个 IP
hosts:
  '*.clash.dev': 127.0.0.1
  '.dev': 127.0.0.1
  'localhost': 127.0.0.1

# 配置持久化

profile:
  # 存储 select 选择记录
  store-selected: true
  # 持久化 fake-ip
  store-fake-ip: true

# 嗅探域名

sniffer:
  enable: true
  # 是否使用嗅探结果作为实际访问，默认 true
  # 全局配置，优先级低于 sniffer.sniff 实际配置
  override-destination: false
  # fake-ip 下改善 QUIC/HTTPS 直连 IP 场景的规则命中
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      # 需要嗅探的端口
      ports: [80, 8080-8880]
      # 可覆盖 sniffer.override-destination
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # 跳过嗅探的域名
  skip-domain:
    - "+.push.apple.com"
    - "Mijia Cloud"
  # 跳过嗅探的目标 IP 段（避免对纯 IP 直连产生无效嗅探警告）
  skip-dst-address:
    - "2001:4860::/32"   # Google IPv6
    - "2404:6800::/32"   # Google IPv6 APAC
    - "2a00:1450::/32"   # Google IPv6 EU
    - "240.0.0.0/4"      # 保留地址

# DNS 设置

dns:
  enable: true
  # 开启 DNS 服务器监听
  listen: 0.0.0.0:1053
  # false 将返回 AAAA 的空结果
  ipv6: false

  # 让系统 hosts 及自定义 hosts 生效（如局域网 NAS、Pi-hole）
  use-system-hosts: true

  # DNS 缓存算法
  cache-algorithm: arc

  # 是否开启 DoH 支持 HTTP/3，将并发尝试
  prefer-h3: false

  # nameserver / fallback 连接不遵守 rules，始终直连
  # 各条目可通过 #proxy 后缀单独指定走代理
  respect-rules: false

  # 用于解析 nameserver、fallback 等 DNS 服务器域名的引导 DNS
  # 只能使用纯 IP 地址
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # 显式禁用 IPv6 fake-ip 池，与 ipv6: false 对齐
  fake-ip-range6: ""
  # fake-ip 条目 TTL，1 秒让连接断开后快速失效
  fake-ip-ttl: 1

  # rule 模式 + ["*"]：所有域名均走 fake-ip，无手工排除列表
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - "*"

  # 主 DNS：经由代理查询，防止境外域名泄露给国内 DNS 服务商
  # ECS 附带国内 IP，让 Google DNS 返回 CDN 最优节点
  nameserver:
    - "https://8.8.8.8/dns-query#proxy&disable-ipv6=true&ecs=114.114.114.114/24&ecs-override=true"

  # 兜底 DNS：nameserver 返回非 CN IP 时触发，同样走代理
  fallback:
    - "https://1.1.1.1/dns-query#proxy"

  fallback-filter:
    geoip: true
    geoip-code: CN

  # 代理节点域名解析：国内 DoH，节点 IP 不会被污染，解析更快
  proxy-server-nameserver:
    - https://doh.pub/dns-query

  # DIRECT 流量专用 DNS，与代理流量语义分离
  direct-nameserver:
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false

# TUN 设置

tun:
  enable: true

  # 网络栈模式
  # system - 性能最高，兼容性一般
  # gvisor - 兼容性好，性能较低
  # mixed - TCP 走系统栈，UDP 走 gvisor（推荐）
  stack: mixed

  # 需要劫持的 DNS
  dns-hijack:
    - any:53

  # 配置路由表
  auto-route: true

  # 自动识别出口网卡
  auto-detect-interface: true

  # Linux 下自动透明代理 TCP，替代手工 iptables/nftables（非 Linux 平台自动忽略）
  auto-redirect: true

  # 启用 GSO（Generic Segmentation Offload）提升 TUN 吞吐
  gso: true
  gso-max-size: 65536

  # 将所有连接路由到 tun 来防止泄漏，但你的设备将无法被其他设备访问
  strict-route: true

  # 启用 auto-route 时使用自定义路由而不是默认路由
  # route-address:
  #   - 0.0.0.0/1
  #   - 128.0.0.0/1

  # 排除路由，这些网段不经过 TUN
  # route-exclude-address:
  #   - 192.168.31.0/24

# 本地节点配置（订阅为空）
proxies: []
