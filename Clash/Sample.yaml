# 服务器订阅配置
proxy-providers:
  Server:
    type: http
    path: ./Provider/Proxy/Server.yaml
    url: https://sub.hotkids.me
    interval: 3600
    proxy: DIRECT
    header:
      User-Agent:
      - "Clash/v1.18.0"
      - "mihomo/1.18.3"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 600

proxy-groups:
  # 全局代理
  - name: "GLOBAL"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
    include-all: true

  # 节点选项
  - name: "🔰 Proxy"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png
    proxies:
      - 🇭🇰 Hong Kong
      - 🇨🇳 Taiwan
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇸 America
      - 🇺🇳 Server
      - 🔘 DIRECT

  # 海外流媒体服务策略组（适用于 Netflix, Disney+, HBO Max, Prime Video 等海外流媒体服务）
  - name: "🎬 Streaming"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Streaming.png
    proxies:
      - 🇭🇰 Hong Kong
      - 🇨🇳 Taiwan
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇸 America
      - 🇺🇳 Server
      - 🔰 Proxy

  # 国内流媒体服务策略组（适用于 iQIYI Intl, WeTV, Bilibili 等大陆在港台东南亚地区提供服务的流媒体服务）
  - name: "📺 CNTV"
    type: select
    icon: https://raw.githubusercontent.com/HotKids/Rules/master/Quantumult/X/Images/StreamingCN.png
    proxies:
      - 🔘 DIRECT
      - 🇨🇳 Taiwan
      - 🇭🇰 Hong Kong

  - name: "🍎 Apple"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
    proxies:
      - 🔘 DIRECT
      - 🔰 Proxy
      - 🇺🇸 America
      - 🇯🇵 Japan

  # Google 服务策略组
  - name: "🔍 Google"
    type: select
    icon: https://raw.githubusercontent.com/HotKids/Rules/master/Quantumult/X/Images/Color/Google.png
    proxies:
      - 🔰 Proxy
      - 🇺🇸 America

  # AIGC 服务策略组
  - name: "🤖 AIGC"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
    proxies:
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇸 America
      - 🔰 Proxy

  # Crypto 服务策略组
  - name: "🪙 Crypto"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cryptocurrency_3.png
    proxies:
      - 🇺🇸 America
      - 🔰 Proxy
      - 🔘 DIRECT

  # Finance 服务策略组
  - name: "💳 Credit"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PayPal.png
    proxies:
      - 🔘 DIRECT
      - 🇺🇸 America
      - 🔰 Proxy

  # Telegram 服务策略组
  - name: "📬 Telegram"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
    proxies:
      - 🔰 Proxy
      - 🇸🇬 Singapore
      - 🔘 DIRECT

  # Mail 邮件服务策略组
  - name: "📧 Mail"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Mail.png
    proxies:
      - 🔰 Proxy
      - 🔘 DIRECT

  # 去广告以及隐私追踪保护、反运营商劫持开关
  - name: "🚧 AdGuard"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Clubhouse_2.png
    proxies:
      - ⛔️ REJECT
      - 🔘 DIRECT

  # 阻止
  - name: "⛔️ REJECT"
    type: select
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Reject.png
    proxies:
      - REJECT

  # 直连
  - name: "🔘 DIRECT"
    type: select
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png
    proxies:
      - DIRECT

  # Nodes
  - name: "🇺🇳 Server"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Clubhouse_1.png
    use:
      - Server

  - name: "🇭🇰 Hong Kong"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    use:
      - Server
    filter: '🇭🇰|Hong Kong|香港'

  - name: "🇨🇳 Taiwan"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    use:
      - Server
    filter: '🇨🇳|🇹🇼|Taiwan|台湾'

  - name: "🇸🇬 Singapore"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    use:
      - Server
    filter: '🇸🇬|Singapore|新加坡'

  - name: "🇯🇵 Japan"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    use:
      - Server
    filter: '🇯🇵|Japan|日本'

  - name: "🇺🇸 America"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
    use:
      - Server
    filter: '🇺🇸|United States|美国'


# 关于 Rule Provider 请查阅：https://wiki.metacubex.one/en/config/rule-providers/

