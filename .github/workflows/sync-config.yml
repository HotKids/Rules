name: Sync Config

on:
  push:
    branches: [master]
    paths:
      - 'Surge/Profile.conf'
      - '.github/scripts/sync-config.py'
      - '.github/scripts/sync-config.txt'
      - '.github/scripts/sync-config/**'
  workflow_dispatch:

permissions:
  contents: write

# 与 sync-rules / sync-modules 共用同一组，串行化对 master 的 push，避免并发 push 冲突
concurrency:
  group: push-master
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth=1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

      - name: Run sync script
        run: python3 .github/scripts/sync-config.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Clash/Sample.yaml Surge/Balloon.lcf Quantumult/Sample.conf Surge/Surfboard.conf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync Profile.conf → Clash / Loon / QX / Surfboard [auto]"
            git push
          fi
