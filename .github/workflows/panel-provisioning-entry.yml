name: Panel provisioning entry

on:
  push:
    branches:
      - master
    paths:
      - '.github/run-panel-provisioning-entry'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Apply panel provisioning entry changes
        run: bash .github/scripts/panel-provisioning-entry.sh
