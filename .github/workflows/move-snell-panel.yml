name: Move Snell Panel

on:
  push:
    branches:
      - master
    paths:
      - '.github/run-move-snell-panel'

permissions:
  contents: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Move snell panel project
        run: bash .github/scripts/move-snell-panel.sh
