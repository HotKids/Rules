name: Sync Rules

on:
  push:
    branches: [master]
    paths:
      - 'Surge/RULE-SET/**'
      - '.github/scripts/sync-rules.txt'
  schedule:
    - cron: '0 16 * * *'   # 每天 UTC 16:00 = UTC+8 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth=1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

      - name: Run sync script
        run: python3 .github/scripts/sync-rules.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Surge/RULE-SET/ Quantumult/X/Filter/ Clash/RuleSet/ sing-box/source/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            FILES=$(git diff --cached --name-only | grep 'Surge/RULE-SET/' | sed 's|Surge/RULE-SET/||;s|\.list||' | head -3 | paste -sd ', ')
            [ -z "$FILES" ] && FILES="RULE-SET"
            case "${{ github.event_name }}" in schedule) TAG=cron;; push) TAG=push;; *) TAG=manual;; esac
            git commit -m "sync: $FILES [$TAG]"
            git push
          fi
