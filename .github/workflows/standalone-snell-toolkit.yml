name: Make Snell Toolkit Standalone

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/standalone-snell-toolkit.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
      - name: Make Snell Toolkit standalone
        run: bash .github/scripts/standalone-snell-toolkit.sh
