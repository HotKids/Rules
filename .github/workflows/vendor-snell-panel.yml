name: Vendor Snell Panel

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/vendor-snell-panel.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
      - name: Vendor Snell Panel source
        run: bash .github/scripts/vendor-snell-panel.sh
