🪙 Crypto = select, 🇺🇸 America, 🔰 Proxy, 🔘 DIRECT, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cryptocurrency_3.png
# Finance
💳 Credit = select, 🇺🇸 America, 🔰 Proxy, 🔘 DIRECT, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PayPal.png
# Telegram
📬 Telegram = select, 🔰 Proxy, 🇸🇬 Singapore, 🔘 DIRECT, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
# Mail
📧 Mail = select, 🔰 Proxy, 🔘 DIRECT, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Mail.png
# Adblock
🚧 AdGuard = select, REJECT, DIRECT, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Clubhouse_2.png
# Nodes
🇺🇳 Server = select, include-all-proxies=true, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Clubhouse_1.png
# Area
🇭🇰 Hong Kong = url-test, include-other-group=🇺🇳 Server, policy-regex-filter=🇭🇰|HK|Hong Kong|香港, interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
🇨🇳 Taiwan = url-test, include-other-group=🇺🇳 Server, policy-regex-filter=🇨🇳|🇹🇼|TW|Taiwan|台湾, interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
🇸🇬 Singapore = url-test, include-other-group=🇺🇳 Server, policy-regex-filter=🇸🇬|SG|Singapore|新加坡, interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
🇯🇵 Japan = url-test, include-other-group=🇺🇳 Server, policy-regex-filter=🇯🇵|JP|Japan|日本, interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
🇺🇸 America = url-test, include-other-group=🇺🇳 Server, policy-regex-filter=🇺🇸|US|United States|美国, interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png

[Rule]
# REJECT-NO-DROP 表示不使用默认的自动丢包逻辑，这样 Surge 每次都会返回 ICMP Port Unreachable，应用会立刻回退而不是等超时。
PROTOCOL, QUIC, REJECT-NO-DROP
# 标准 SSH 端口
DEST-PORT, 22, 🔘 DIRECT
# Unbreak 后续规则修正
RULE-SET, https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Unbreak.list, 🔘 DIRECT
# HTTPDNS 请求/流量阻止
RULE-SET, https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/HTTPDNS.Block.list, 🚧 AdGuard
# Advertising 广告
DOMAIN-SET, https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/reject.txt, 🚧 AdGuard
RULE-SET, https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/AD.list, 🚧 AdGuard
RULE-SET, https://raw.githubusercontent.com/ConnersHua/RuleGo/master/Surge/Ruleset/Extra/Reject/Advertising.list, 🚧 AdGuard
# Privacy 隐私
RULE-SET, https://raw.githubusercontent.com/ConnersHua/RuleGo/master/Surge/Ruleset/Extra/Reject/Tracking.list, 🚧 AdGuard
# Hijacking 运营商劫持或恶意网站
RULE-SET, https://raw.githubusercontent.com/ConnersHua/RuleGo/master/Surge/Ruleset/Extra/Reject/Malicious.list, 🚧 AdGuard
# # Global Area Network
# > 一些无需验证地区的分流 HOST
RULE-SET, https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Streaming+.list, 🔰 Proxy
# > Streaming by Region
# >> Streaming TW
RULE-SET, https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Streaming_TW.list, 🇨🇳 Taiwan
# >> Streaming JP
