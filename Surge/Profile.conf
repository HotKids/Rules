RULE-SET,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Block.list,🚧 AdGuard,extended-matching
# Phishing 钓鱼网站
DOMAIN-SET,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Phishing.list,🚧 AdGuard,extended-matching
# Bogus IP NXDOMAIN 劫持/僵尸网络 C2
