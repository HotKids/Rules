[Rule]
# HTTP3/QUIC 协议：走代理时 UDP 表现差，屏蔽境外 QUIC 强制回退 HTTP2/HTTP1.1；
# 国内 QUIC 走直连、不受代理拖累，放行以保留 HTTP/3 性能（避免误伤 B 站/淘宝等国内 HTTP/3）。
# REJECT-NO-DROP 返回 ICMP Port Unreachable，应用立刻回退而不等超时。
AND,((PROTOCOL,QUIC),(GEOIP,CN)),🔘 DIRECT,no-resolve
PROTOCOL,QUIC,REJECT-NO-DROP

# 标准 SSH 端口
AND,((DEST-PORT,22),(PROTOCOL,TCP)),🔘 DIRECT

# Unbreak 后续规则修正，修复因规则拦截或分流不当导致的功能异常
RULE-SET,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Bypass.list,🔘 DIRECT
RULE-SET,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Reroute.list,🔰 Proxy

# Private 私有网络
DOMAIN-SET,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/private.txt,🔘 DIRECT
# HTTPDNS 请求/流量阻止
RULE-SET,https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/HTTPDNS.Block.list,🚧 AdGuard,extended-matching
# Advertising 广告
